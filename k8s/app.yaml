apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-final-job
  namespace: default
  labels:
    app: front-final-job
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-final-job
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: front-final-job
    spec:
      containers:
        - name: front-final-job
          image: ghcr.io/mehdi-chebbi/front-final-job:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5173
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: front-final-job
  namespace: default
  labels:
    app: front-final-job
spec:
  type: ClusterIP
  selector:
    app: front-final-job
  ports:
    - port: 80
      targetPort: 5173
      protocol: TCP